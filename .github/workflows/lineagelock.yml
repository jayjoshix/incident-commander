name: LineageLock PR Guard

on:
  pull_request:
    paths:
      - 'models/**'
      - 'sql/**'
      - 'schemas/**'

permissions:
  contents: read
  pull-requests: write
  issues: write       # for label automation
  checks: write       # for GitHub Check Run

jobs:
  lineagelock:
    name: 🔒 LineageLock Risk Analysis
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      # ── GREEN demo branch: always passes (safe low-risk change) ──────────
      - name: Run LineageLock (Safe — demo/green-safe-merge)
        if: github.head_ref == 'demo/green-safe-merge'
        uses: ./
        env:
          LINEAGELOCK_DEMO_MODE: 'true'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openmetadata-url: ${{ secrets.OPENMETADATA_URL }}
          openmetadata-token: ${{ secrets.OPENMETADATA_TOKEN }}
          config-path: '.lineagelock.json'
          warn-threshold: '200'   # impossible to warn — always green
          fail-threshold: '200'   # impossible to fail  — always green

      # ── RED demo branch: always blocks (PII Tier1 critical change) ───────
      - name: Run LineageLock (Blocked — demo/red-blocked-merge)
        if: github.head_ref == 'demo/red-blocked-merge'
        uses: ./
        env:
          LINEAGELOCK_DEMO_MODE: 'true'
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openmetadata-url: ${{ secrets.OPENMETADATA_URL }}
          openmetadata-token: ${{ secrets.OPENMETADATA_TOKEN }}
          config-path: '.lineagelock.json'
          warn-threshold: '30'
          fail-threshold: '70'    # demo CRITICAL score is 100 — always fails

      # ── All other PRs: live OpenMetadata analysis ─────────────────────────
      - name: Run LineageLock (Live)
        if: github.head_ref != 'demo/green-safe-merge' && github.head_ref != 'demo/red-blocked-merge'
        uses: ./
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          openmetadata-url: ${{ secrets.OPENMETADATA_URL }}
          openmetadata-token: ${{ secrets.OPENMETADATA_TOKEN }}
          config-path: '.lineagelock.json'
          warn-threshold: '30'
          fail-threshold: '70'
